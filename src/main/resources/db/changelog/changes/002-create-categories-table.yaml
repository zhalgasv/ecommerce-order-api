databaseChangeLog:
  - changeSet:
      id: 002-create-categories-table
      author: zhalgas
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: VARCHAR(255)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false