databaseChangeLog:
  - changeSet:
      id: 005-create-cart-items-table
      author: zhalgas
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: cart_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_cart
                    references: carts(id)

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_product
                    references: products(id)

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false