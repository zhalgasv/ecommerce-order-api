databaseChangeLog:
  - changeSet:
      id: 004-create-carts-table
      author: zhalgas
      changes:
        - createTable:
            tableName: carts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_user
                    references: users(id)
                    unique: true

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false